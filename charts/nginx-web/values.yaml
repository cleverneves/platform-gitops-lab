replicaCount: 2

image:
  tag: "1.27-alpine"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

namespace: nginx-web

server-block: |
  server {
    listen 80;
    server_name _;
    location / {
      return 200 'Hello, World! from Nginx via Argo CD Helm';
      add_header Content-Type text/plain;
    }
    location /health {
      return 200 'OK';
      add_header Content-Type text/plain;
    }
  }
